<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 260px; font-family: sans-serif; margin: 0; padding: 12px; }
    #status-badge { padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; display: inline-block; }
    .idle { background: #f0f0f0; color: #666; }
    .recording { background: #fde8e8; color: #c0392b; }
    .processing { background: #fef9e7; color: #b7770d; }
    .done { background: #e8f8f0; color: #1e8449; }
    #timer { font-size: 28px; font-weight: bold; text-align: center; margin: 8px 0; letter-spacing: 2px; color: #222; }
    #size { font-size: 11px; color: #888; text-align: center; margin-bottom: 10px; min-height: 16px; }
    button { width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 4px; }
    #start-btn { background: #534AB7; color: white; }
    #start-btn:hover { background: #4a42a8; }
    #stop-btn { background: #E24B4A; color: white; display: none; }
    #stop-btn:hover { background: #c73f3e; }
    #transcript-box { margin-top: 12px; font-size: 11px; color: #444; background: #f9f9f9; border-radius: 6px; padding: 8px; max-height: 120px; overflow-y: auto; line-height: 1.6; display: none; white-space: pre-wrap; }
    #drive-link { display: none; margin-top: 8px; font-size: 11px; color: #1a73e8; text-decoration: none; }
    #drive-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="status-badge" class="idle">Готовий до запису</div>
  <div id="timer">00:00:00</div>
  <div id="size"></div>
  <button id="start-btn">Почати запис</button>
  <button id="stop-btn">Зупинити та зберегти</button>
  <div id="transcript-box"></div>
  <a id="drive-link" target="_blank">Відкрити на Google Drive ↗</a>
  <script src="popup.js"></script>
</body>
</html>
