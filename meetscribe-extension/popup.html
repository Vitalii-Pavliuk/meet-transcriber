<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; font-family: sans-serif; margin: 0; padding: 12px; }

    #status-badge { padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; display: inline-block; }
    .idle     { background: #f0f0f0; color: #666; }
    .recording{ background: #fde8e8; color: #c0392b; }
    .processing{background: #fef9e7; color: #b7770d; }
    .done     { background: #e8f8f0; color: #1e8449; }

    #timer { font-size: 28px; font-weight: bold; text-align: center; margin: 8px 0; letter-spacing: 2px; color: #222; }
    #size  { font-size: 11px; color: #888; text-align: center; margin-bottom: 10px; min-height: 16px; }

    .row { display: flex; gap: 6px; margin-bottom: 6px; }

    /* Мова */
    #lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    #lang-row label { font-size: 12px; color: #555; white-space: nowrap; }
    #lang-select { flex: 1; font-size: 12px; padding: 4px 6px; border-radius: 6px; border: 1px solid #ddd; }

    button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
    #start-btn  { background: #534AB7; color: white; }
    #start-btn:hover { background: #4a42a8; }
    #stop-btn   { background: #E24B4A; color: white; display: none; }
    #stop-btn:hover  { background: #c73f3e; }
    #cancel-btn { background: #f0f0f0; color: #555; display: none; flex: 0 0 auto; width: 42px; padding: 10px 0; font-size: 16px; }
    #cancel-btn:hover { background: #e0e0e0; }

    #drive-btn  { width: 100%; padding: 9px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; background: #1a73e8; color: white; display: none; margin-top: 6px; }
    #drive-btn:hover { background: #1558b0; }
    #drive-btn:disabled { background: #aaa; cursor: default; }

    #transcript-box { margin-top: 10px; font-size: 11px; color: #444; background: #f9f9f9; border-radius: 6px; padding: 8px; max-height: 150px; overflow-y: auto; line-height: 1.6; display: none; white-space: pre-wrap; border: 1px solid #eee; }
  </style>
</head>
<body>
  <div id="status-badge" class="idle">Готовий до запису</div>
  <div id="timer">00:00:00</div>
  <div id="size"></div>

  <div id="lang-row">
    <label for="lang-select">Мова:</label>
    <select id="lang-select">
      <option value="auto">Авто (визначити)</option>
      <option value="uk">Українська</option>
      <option value="en">Англійська</option>
    </select>
  </div>

  <div class="row">
    <button id="start-btn">Почати запис</button>
    <button id="stop-btn">Зупинити</button>
    <button id="cancel-btn" title="Скасувати запис">✕</button>
  </div>

  <div id="transcript-box"></div>
  <button id="drive-btn">Зберегти на Google Drive</button>

  <script src="popup.js"></script>
</body>
</html>
