<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Meet Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="state-idle">
  <div id="status-badge" class="status-badge idle">Готовий до запису</div>
  
  <div id="timer" class="timer">00:00:00</div>
  <div id="size" class="size-info"></div>

  <div class="lang-row">
    <label for="lang-select">Мова:</label>
    <select id="lang-select" class="lang-select">
      <option value="auto">Авто (визначити)</option>
      <option value="uk">Українська</option>
      <option value="en">Англійська</option>
    </select>
  </div>

  <div class="btn-row">
    <button id="start-btn" class="btn-primary">Почати запис</button>
    <button id="stop-btn" class="btn-danger">Зупинити</button>
    <button id="cancel-btn" class="btn-icon" title="Скасувати запис">✕</button>
  </div>

  <div id="transcript-box" class="transcript-box"></div>
  <button id="drive-btn" class="btn-drive">Зберегти на Google Drive</button>

  <script src="popup.js"></script>
</body>
</html>
